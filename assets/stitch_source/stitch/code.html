<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OpticSpace | Advanced Optics Simulator</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#06B6D4",
                        "background-light": "#f5f6f8",
                        "background-dark": "#0D0D0F",
                        "surface": "#141417",
                        "border-muted": "#2A2A2D"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .dot-grid {
            background-image: radial-gradient(#2A2A2D 1px, transparent 1px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased overflow-hidden h-screen flex flex-col">
<!-- Top Navigation -->
<header class="h-[56px] border-b border-border-muted bg-surface flex items-center justify-between px-4 z-20">
<div class="flex items-center gap-3">
<div class="flex items-center justify-center size-8 bg-primary/10 rounded">
<span class="material-symbols-outlined text-primary text-xl">architecture</span>
</div>
<h1 class="text-[#FAFAFA] text-lg font-bold tracking-tight">OpticSpace</h1>
</div>
<nav class="flex items-center gap-1 bg-background-dark/50 p-1 rounded-lg border border-border-muted">
<button class="flex items-center gap-2 px-3 py-1.5 text-xs font-medium bg-primary/20 text-primary rounded shadow-sm">
<span class="material-symbols-outlined text-sm">near_me</span> Select
            </button>
<button class="flex items-center gap-2 px-3 py-1.5 text-xs font-medium text-slate-400 hover:text-white transition-colors">
<span class="material-symbols-outlined text-sm">pan_tool</span> Pan
            </button>
<button class="flex items-center gap-2 px-3 py-1.5 text-xs font-medium text-slate-400 hover:text-white transition-colors">
<span class="material-symbols-outlined text-sm">open_with</span> Move Object
            </button>
</nav>
<div class="flex items-center gap-3">
<button class="px-4 py-1.5 text-xs font-semibold text-slate-400 hover:text-white transition-colors">
                Clear Canvas
            </button>
<button class="px-4 py-1.5 bg-slate-100 text-slate-950 text-xs font-bold rounded-lg hover:bg-white transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-sm">download</span> Export PNG
            </button>
<div class="size-8 rounded-full border border-border-muted overflow-hidden bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-slate-400">person</span>
</div>
</div>
</header>
<div class="flex flex-1 overflow-hidden">
<!-- Left Sidebar -->
<aside class="w-[280px] bg-surface border-r border-border-muted flex flex-col overflow-y-auto z-10">
<!-- Section: Light Source -->
<div class="p-4 border-b border-border-muted">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary text-lg">lightbulb</span>
<h3 class="text-[10px] font-bold tracking-widest text-slate-500 uppercase">Light Source</h3>
</div>
<div class="flex bg-background-dark p-1 rounded mb-6 border border-border-muted">
<button class="flex-1 py-1 text-[11px] font-semibold bg-primary text-white rounded shadow-lg">Point</button>
<button class="flex-1 py-1 text-[11px] font-semibold text-slate-500">Laser</button>
</div>
<div class="space-y-6">
<div class="space-y-3">
<div class="flex justify-between items-center">
<label class="text-[11px] font-medium text-slate-400">Rays</label>
<span class="text-[11px] font-mono text-primary bg-primary/10 px-1.5 py-0.5 rounded">128</span>
</div>
<div class="relative w-full h-1.5 bg-background-dark rounded-full overflow-hidden border border-border-muted">
<div class="absolute top-0 left-0 h-full w-[60%] bg-primary"></div>
</div>
</div>
<div class="space-y-3">
<div class="flex justify-between items-center">
<label class="text-[11px] font-medium text-slate-400">Spread</label>
<span class="text-[11px] font-mono text-primary bg-primary/10 px-1.5 py-0.5 rounded">45°</span>
</div>
<div class="relative w-full h-1.5 bg-background-dark rounded-full overflow-hidden border border-border-muted">
<div class="absolute top-0 left-0 h-full w-[40%] bg-primary"></div>
</div>
</div>
<div class="space-y-3">
<div class="flex justify-between items-center">
<label class="text-[11px] font-medium text-slate-400">Beam Color</label>
<div class="size-4 rounded-full bg-primary ring-2 ring-primary/20"></div>
</div>
</div>
</div>
</div>
<!-- Section: Optical Elements -->
<div class="p-4 border-b border-border-muted">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary text-lg">category</span>
<h3 class="text-[10px] font-bold tracking-widest text-slate-500 uppercase">Optical Elements</h3>
</div>
<div class="grid grid-cols-2 gap-2">
<button class="flex flex-col items-center justify-center p-3 bg-primary/10 border border-primary/50 rounded-lg group transition-all">
<span class="material-symbols-outlined text-primary mb-1">remove</span>
<span class="text-[10px] font-medium text-primary">Flat Mirror</span>
</button>
<button class="flex flex-col items-center justify-center p-3 bg-background-dark border border-border-muted hover:border-slate-600 rounded-lg group transition-all">
<span class="material-symbols-outlined text-slate-400 mb-1">circle</span>
<span class="text-[10px] font-medium text-slate-400">Concave</span>
</button>
<button class="flex flex-col items-center justify-center p-3 bg-background-dark border border-border-muted hover:border-slate-600 rounded-lg group transition-all">
<span class="material-symbols-outlined text-slate-400 mb-1">blur_circular</span>
<span class="text-[10px] font-medium text-slate-400">Convex</span>
</button>
<button class="flex flex-col items-center justify-center p-3 bg-background-dark border border-border-muted hover:border-slate-600 rounded-lg group transition-all">
<span class="material-symbols-outlined text-slate-400 mb-1">change_history</span>
<span class="text-[10px] font-medium text-slate-400">45° Prism</span>
</button>
</div>
</div>
<!-- Section: Render Settings -->
<div class="p-4">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary text-lg">settings_suggest</span>
<h3 class="text-[10px] font-bold tracking-widest text-slate-500 uppercase">Render Settings</h3>
</div>
<div class="space-y-4">
<div class="flex items-center justify-between">
<span class="text-[11px] text-slate-400">Show Normals</span>
<div class="w-8 h-4 bg-primary rounded-full relative p-0.5">
<div class="size-3 bg-white rounded-full ml-auto"></div>
</div>
</div>
<div class="flex items-center justify-between">
<span class="text-[11px] text-slate-400">Diffuse Reflection</span>
<div class="w-8 h-4 bg-slate-700 rounded-full relative p-0.5">
<div class="size-3 bg-slate-400 rounded-full"></div>
</div>
</div>
<div class="space-y-3 pt-2">
<div class="flex justify-between items-center">
<label class="text-[11px] font-medium text-slate-400">Max Bounces</label>
<span class="text-[11px] font-mono text-slate-500">8</span>
</div>
<div class="relative w-full h-1 bg-slate-700 rounded-full">
<div class="absolute top-0 left-0 h-full w-[30%] bg-slate-400"></div>
</div>
</div>
</div>
</div>
</aside>
<!-- Main Canvas -->
<main class="flex-1 relative bg-background-dark dot-grid overflow-hidden flex items-center justify-center">
<!-- Canvas Simulation Visualization (SVG for precision) -->
<svg class="absolute inset-0 w-full h-full" xmlns="http://www.w3.org/2000/svg">
<!-- Source Point -->
<circle cx="20%" cy="50%" fill="white" filter="drop-shadow(0 0 8px white)" r="4"></circle>
<circle cx="20%" cy="50%" fill="white" fill-opacity="0.1" r="8"></circle>
<!-- Rays -->
<g stroke="#06B6D4" stroke-opacity="0.8" stroke-width="1.5">
<!-- Central Ray -->
<line stroke-dasharray="4 2" stroke-opacity="0.3" x1="20%" x2="50%" y1="50%" y2="50%"></line>
<!-- Reflected Ray Path -->
<line x1="20%" x2="50%" y1="50%" y2="50%"></line>
<line x1="50%" x2="50%" y1="50%" y2="20%"></line>
<!-- Fan of rays -->
<line stroke-opacity="0.4" x1="20%" x2="50%" y1="50%" y2="55%"></line>
<line stroke-opacity="0.4" x1="20%" x2="50%" y1="50%" y2="45%"></line>
<line stroke-opacity="0.4" x1="50%" x2="55%" y1="55%" y2="20%"></line>
<line stroke-opacity="0.4" x1="50%" x2="45%" y1="45%" y2="20%"></line>
</g>
<!-- Mirror -->
<line stroke="white" stroke-linecap="round" stroke-width="4" x1="40%" x2="60%" y1="60%" y2="40%"></line>
<line stroke="#06B6D4" stroke-opacity="0.5" stroke-width="1" x1="40%" x2="60%" y1="60%" y2="40%"></line>
<!-- Normal Line -->
<line stroke="slate-500" stroke-dasharray="6 4" stroke-opacity="0.5" stroke-width="1" x1="50%" x2="40%" y1="50%" y2="40%"></line>
<!-- Labels -->
<text fill="#06B6D4" font-family="Inter" font-size="12" font-weight="600" x="45%" y="54%">45°</text>
<text fill="#06B6D4" font-family="Inter" font-size="12" font-weight="600" x="52%" y="46%">45°</text>
</svg>
<!-- Floating View Controls -->
<div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-2 bg-surface/80 backdrop-blur-md border border-border-muted p-1 rounded-xl shadow-2xl">
<button class="size-9 flex items-center justify-center rounded-lg hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-slate-400">zoom_in</span>
</button>
<button class="size-9 flex items-center justify-center rounded-lg hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-slate-400">zoom_out</span>
</button>
<div class="h-4 w-px bg-border-muted mx-1"></div>
<div class="px-3 text-[10px] font-mono font-bold text-slate-500 tracking-wider">100%</div>
<div class="h-4 w-px bg-border-muted mx-1"></div>
<button class="size-9 flex items-center justify-center rounded-lg hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-slate-400">grid_on</span>
</button>
<button class="size-9 flex items-center justify-center rounded-lg hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-slate-400">center_focus_weak</span>
</button>
</div>
<!-- Viewport Info -->
<div class="absolute top-6 right-6 flex flex-col items-end gap-1">
<div class="bg-surface/60 backdrop-blur px-2 py-1 rounded border border-border-muted flex items-center gap-2">
<span class="size-1.5 rounded-full bg-emerald-500"></span>
<span class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">Engine: WebGL 2.0</span>
</div>
<div class="text-[10px] font-mono text-slate-600">FPS: 60.0</div>
</div>
</main>
<!-- Right Properties Sidebar (Optional - Minimal) -->
<aside class="w-12 bg-surface border-l border-border-muted flex flex-col items-center py-4 gap-6">
<button class="text-primary"><span class="material-symbols-outlined">layers</span></button>
<button class="text-slate-600 hover:text-slate-400"><span class="material-symbols-outlined">history</span></button>
<button class="text-slate-600 hover:text-slate-400"><span class="material-symbols-outlined">help</span></button>
</aside>
</div>
</body></html>
